version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  json:
    (): pythonjsonlogger.json.JsonFormatter
    format: "%(asctime)s %(levelname)s %(name)s %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout
  file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: json
    filename: logs/langchain-chat.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf-8
    delay: true

root:
  level: INFO
  handlers:
    - console
    - file

loggers:
  urllib3:
    level: WARNING
    handlers: []
    propagate: true
  asyncio:
    level: WARNING
    handlers: []
    propagate: true
